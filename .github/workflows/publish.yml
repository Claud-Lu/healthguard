name: Publish npm packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify
        run: |
          yarn build
          yarn test
          yarn type-check
          yarn lint

      - name: Publish packages
        run: |
          for dir in ./packages/core ./packages/sdk-web ./packages/sdk-miniprogram ./packages/sdk-uniapp ./packages/repair-agent; do
            pkg=$(node -p "require('$dir/package.json').name")
            version=$(node -p "require('$dir/package.json').version")
            if npm view "$pkg@$version" version >/dev/null 2>&1; then
              echo "$pkg@$version already published; skipping"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
